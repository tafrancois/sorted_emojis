<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Emoji Sorter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        .container { max-width: 700px; margin: 0 auto; }

        h1 {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #ffd1dc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        button {
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(to right, #a855f7, #ec4899);
            color: white;
            font-weight: bold;
            padding: 0.9rem;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* --- Emoji List --- */
        .section {
            background: white;
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #9333ea;
        }

        .copy-btn {
            background: #3b82f6;
            color: white;
            padding: 0.4rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .copy-btn:active { background: #2563eb; }
        .copy-btn.copied { background: #10b981; }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.5rem;
        }

        .emoji-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem;
            background: #f3e8ff;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .emoji-item:hover, .emoji-item.selected { background: #e0cffc; }

        .emoji-char { font-size: 1.75rem; }
        .emoji-name { font-size: 0.8rem; color: #4b5563; }

        /* --- Bin Picker Popup --- */
        .bin-picker {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 1rem;
            border-radius: 1rem 1rem 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .bin-picker.open { display: block; }

        .bin-picker-label {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .bin-picker-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .bin-picker-buttons button {
            flex: 1;
            padding: 0.85rem;
            border-radius: 0.6rem;
            color: white;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .btn-signal { background: #8b5cf6; }
        .btn-potential { background: #f59e0b; }
        .btn-noise { background: #6b7280; }

        .bin-picker-cancel {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.7rem;
            background: #e5e7eb;
            color: #374151;
            border-radius: 0.6rem;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 99;
        }
        .overlay.open { display: block; }

        /* --- Bins --- */
        .bin {
            background: white;
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .bin-label-signal { color: #8b5cf6; }
        .bin-label-potential { color: #f59e0b; }
        .bin-label-noise { color: #6b7280; }

        .bin-content {
            width: 100%;
            min-height: 80px;
            border: 2px dashed #d1d5db;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            line-height: 1.6;
            color: #1f2937;
        }
        .bin-content:focus { outline: none; border-color: #a78bfa; }

        .bin-content:empty::before {
            content: attr(data-placeholder);
            color: #9ca3af;
        }

        /* --- Copy All --- */
        .copy-all-btn {
            width: 100%;
            background: linear-gradient(to right, #a855f7, #ec4899);
            color: white;
            font-weight: bold;
            padding: 0.9rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Emoji Sorter</h1>
        <p class="subtitle">Generate 17 emojis, then sort them into Signal, Potential, or Noise</p>

        <button class="generate-btn" onclick="generate()">🎲 Generate Emojis</button>

        <div id="results" class="hidden">
            <!-- Emoji List -->
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">🎭 Emojis</h2>
                    <button class="copy-btn" onclick="copyList(this)">📋 Copy List</button>
                </div>
                <div id="emoji-grid" class="emoji-grid"></div>
            </div>

            <!-- Bins -->
            <div class="bin" id="bin-signal">
                <div class="section-header">
                    <h2 class="section-title bin-label-signal">🟣 Signal</h2>
                    <button class="copy-btn" onclick="copyBin('signal', this)">📋 Copy</button>
                </div>
                <div class="bin-content" id="content-signal" contenteditable="true" data-placeholder="Emojis sorted here — type notes anywhere..."></div>
            </div>

            <div class="bin" id="bin-potential">
                <div class="section-header">
                    <h2 class="section-title bin-label-potential">🟡 Potential</h2>
                    <button class="copy-btn" onclick="copyBin('potential', this)">📋 Copy</button>
                </div>
                <div class="bin-content" id="content-potential" contenteditable="true" data-placeholder="Emojis sorted here — type notes anywhere..."></div>
            </div>

            <div class="bin" id="bin-noise">
                <div class="section-header">
                    <h2 class="section-title bin-label-noise">⚪ Noise</h2>
                    <button class="copy-btn" onclick="copyBin('noise', this)">📋 Copy</button>
                </div>
                <div class="bin-content" id="content-noise" contenteditable="true" data-placeholder="Emojis sorted here — type notes anywhere..."></div>
            </div>

            <!-- Copy All -->
            <button class="copy-all-btn" onclick="copyAll(this)">📋 Copy All to Clipboard</button>
        </div>
    </div>

    <!-- Bin Picker (bottom sheet) -->
    <div class="overlay" id="overlay" onclick="closePicker()"></div>
    <div class="bin-picker" id="bin-picker">
        <div class="bin-picker-label" id="picker-emoji"></div>
        <div class="bin-picker-buttons">
            <button class="btn-signal" onclick="addToBin('signal')">Signal</button>
            <button class="btn-potential" onclick="addToBin('potential')">Potential</button>
            <button class="btn-noise" onclick="addToBin('noise')">Noise</button>
        </div>
        <button class="bin-picker-cancel" onclick="closePicker()">Cancel</button>
    </div>

        let selectedEmojis = [];
        let pickerEmoji = null;

        function getRandomItems(array, count) {
            const copy = [...array];
            const selected = [];
            while (selected.length < count && copy.length > 0) {
                const i = Math.floor(Math.random() * copy.length);
                selected.push(copy.splice(i, 1)[0]);
            }
            return selected;
        }

        function generate() {
            selectedEmojis = getRandomItems(Object.keys(EMOJI_DATABASE), 17);
            displayEmojis();
            ['signal', 'potential', 'noise'].forEach(id => {
                document.getElementById('content-' + id).innerHTML = '';
            });
            document.getElementById('results').classList.remove('hidden');
        }

        function displayEmojis() {
            const grid = document.getElementById('emoji-grid');
            grid.innerHTML = '';
            selectedEmojis.forEach(emoji => {
                const item = document.createElement('div');
                item.className = 'emoji-item';
                item.innerHTML = `<span class="emoji-char">${emoji}</span><span class="emoji-name">${EMOJI_DATABASE[emoji]}</span>`;
                item.onclick = () => openPicker(emoji);
                grid.appendChild(item);
            });
        }

        function openPicker(emoji) {
            pickerEmoji = emoji;
            document.getElementById('picker-emoji').textContent = emoji + ' ' + EMOJI_DATABASE[emoji];
            document.getElementById('bin-picker').classList.add('open');
            document.getElementById('overlay').classList.add('open');
        }

        function closePicker() {
            pickerEmoji = null;
            document.getElementById('bin-picker').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }

        function addToBin(binName) {
            if (!pickerEmoji) return;
            const container = document.getElementById('content-' + binName);
            const text = pickerEmoji + ' ' + EMOJI_DATABASE[pickerEmoji];

            if (container.textContent.trim().length > 0) {
                container.appendChild(document.createElement('br'));
            }
            container.appendChild(document.createTextNode(text));

            closePicker();
        }

        function getListText() {
            return selectedEmojis.map(e => `${e} ${EMOJI_DATABASE[e]}`).join(', ');
        }

        function getBinText(binName) {
            const el = document.getElementById('content-' + binName);
            return el.innerText.trim();
        }

        function copyText(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
            }
            return fallbackCopy(text);
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            return Promise.resolve();
        }

        function flashCopied(btn) {
            const orig = btn.textContent;
            btn.textContent = '✓ Copied!';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
        }

        function copyList(btn) {
            copyText(getListText()).then(() => flashCopied(btn));
        }

        function copyBin(binName, btn) {
            const label = binName.charAt(0).toUpperCase() + binName.slice(1);
            const text = label + '\n' + getBinText(binName);
            copyText(text).then(() => flashCopied(btn));
        }

        function copyAll(btn) {
            let out = '--- Emojis ---\n' + getListText() + '\n\n';
            ['signal', 'potential', 'noise'].forEach(bin => {
                const label = bin.charAt(0).toUpperCase() + bin.slice(1);
                const content = getBinText(bin);
                out += '--- ' + label + ' ---\n' + (content || '(empty)') + '\n\n';
            });
            copyText(out.trim()).then(() => flashCopied(btn));
        }
