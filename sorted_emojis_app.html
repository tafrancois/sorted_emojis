<html lang="en">

    <title>Sorted Emojis</title>

    <link rel="manifest" href="./manifest.json">

    <!-- PWA: Theme color (status bar tint) -->
    <meta name="theme-color" content="#8b5cf6">

    <!-- PWA: Apple-specific tags for iOS Safari "Add to Home Screen" -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sorted Emojis">

    <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">

            min-height: 100vh;
            min-height: 100dvh;
            padding: 1rem;
            padding-top: max(1rem, env(safe-area-inset-top));
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
            padding-left: max(1rem, env(safe-area-inset-left));
            padding-right: max(1rem, env(safe-area-inset-right));
        }

        .container { max-width: 700px; margin: 0 auto; }

        h1 {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #ffd1dc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        button {
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(to right, #a855f7, #ec4899);
            color: white;
            font-weight: bold;
            padding: 0.9rem;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* --- Emoji List --- */
        .section {
            background: white;
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #9333ea;
        }

        .copy-btn {
            background: #3b82f6;
            color: white;
            padding: 0.4rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .copy-btn:active { background: #2563eb; }
        .copy-btn.copied { background: #10b981; }

        .emoji-grid {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .emoji-row {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.5rem 0.6rem;
            background: #f3e8ff;
            border-radius: 0.5rem;
            -webkit-tap-highlight-color: transparent;
        }

        .emoji-row-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-shrink: 0;
            min-width: 0;
            max-width: 50%;
            padding-top: 0.25rem;
        }

        .emoji-row-label .emoji-name {
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.25;
        }

        .emoji-note-input {
            flex: 1;
            min-width: 0;
            padding: 0.4rem 0.6rem;
            border: 1px solid #d8c5ff;
            border-radius: 0.4rem;
            background: white;
            font-size: 0.9rem;
            font-family: inherit;
            color: #1f2937;
            outline: none;
            resize: none;
            overflow: hidden;
            line-height: 1.5;
            box-sizing: border-box;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .emoji-note-input:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.2);
        }

        .notes-area {
            width: 100%;
            min-height: 80px;
            padding: 0.8rem;
            border: 2px solid #d8c5ff;
            border-radius: 0.5rem;
            background: white;
            font-size: 0.95rem;
            font-family: inherit;
            color: #1f2937;
            outline: none;
            resize: none;
            overflow: hidden;
            box-sizing: border-box;
            line-height: 1.5;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .notes-area:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
        }

        .prompt-area {
            width: 100%;
            min-height: 60px;
            padding: 0.8rem;
            border: 2px solid #d8c5ff;
            border-radius: 0.5rem;
            background: white;
            font-size: 0.95rem;
            font-family: inherit;
            color: #1f2937;
            outline: none;
            resize: none;
            overflow: hidden;
            box-sizing: border-box;
            line-height: 1.5;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .prompt-area:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
        }

        /* Legacy class kept for any references */
        .emoji-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem;
            background: #f3e8ff;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;

        .emoji-char { font-size: 1.75rem; }
        .emoji-name { font-size: 0.8rem; color: #4b5563; }

        .genmoji-img {
            width: 1.75rem;
            height: 1.75rem;
            object-fit: contain;
            flex-shrink: 0;
        }
        .genmoji-img-picker {
            width: 2rem;
            height: 2rem;
            object-fit: contain;
            vertical-align: middle;
        }
        .genmoji-img-bin {
            width: 1.5rem;
            height: 1.5rem;
            object-fit: contain;
            vertical-align: middle;
            display: inline-block;
        }

            width: 100%;
            background: linear-gradient(to right, #a855f7, #ec4899);
            color: white;
            font-weight: bold;
            padding: 0.9rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);

        .hidden { display: none; }

<body>
    <div class="container">
        <h1>✨ Emoji Sorter</h1>
        <p class="subtitle">Set a prompt, pull 15 emojis + 5 from Simon's Channel, annotate each one and capture bigger observations in Notes & Quotes</p>

        <!-- Prompt -->
        <div class="section prompt-section">
            <div class="section-header">
                <h2 class="section-title">🎯 Prompt</h2>
            </div>
            <textarea id="prompt-area" class="prompt-area" oninput="autoGrow(this)"></textarea>
        </div>

        <button class="generate-btn" onclick="generate()">🎲 Generate Emojis</button>

        <div id="results" class="hidden">
            <!-- Emoji List -->
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">🎭 Emojis</h2>
                    <button class="copy-btn" onclick="copyList(this)">📋 Copy List</button>
                </div>
                <div id="emoji-grid" class="emoji-grid"></div>
            </div>

            <!-- Simon's Channel -->
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">🔴 Simon's Channel</h2>
                    <button class="copy-btn" onclick="copySimonList(this)">📋 Copy List</button>
                </div>
                <div id="simon-grid" class="emoji-grid"></div>
            </div>

            <!-- Bins -->
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">📓 Notes & Quotes</h2>
                    <button class="copy-btn" onclick="copyNotes(this)">📋 Copy</button>
                </div>
                <textarea id="notes-quotes" class="notes-area" oninput="autoGrow(this)"></textarea>
            </div>

            <!-- Copy All -->
            <button class="copy-all-btn" onclick="copyAll(this)">📋 Copy All to Clipboard</button>
        </div>
    </div>

        let selectedEmojis = [];
        let simonEmojis = [];

        function getRandomItems(array, count) {
            const copy = [...array];
            const selected = [];
            while (selected.length < count && copy.length > 0) {
                const i = Math.floor(Math.random() * copy.length);
                selected.push(copy.splice(i, 1)[0]);
            }
            return selected;
        }

        // Helper functions to handle both standard emojis and Genmojis
        function isGenmoji(key) {
            return key.startsWith('genmoji_');
        }

        function getName(key) {
            if (isGenmoji(key)) return GENMOJI_DATABASE[key].name;
            return EMOJI_DATABASE[key];
        }

        function renderEmojiHTML(key) {
            // Returns HTML for displaying the emoji character (image for genmoji, text for standard)
            if (isGenmoji(key)) {
                return `<img src="${GENMOJI_DATABASE[key].image}" alt="${GENMOJI_DATABASE[key].name}" class="genmoji-img">`;
            }
            return key;
        }

        function getAllKeys() {
            return [...Object.keys(EMOJI_DATABASE), ...Object.keys(GENMOJI_DATABASE)];
        }

        function generate() {
            selectedEmojis = getRandomItems(getAllKeys(), 15);
            simonEmojis = getRandomItems(SIMON_CHANNEL_KEYS, 5);
            displayEmojis();
            // Clear prompt and Notes & Quotes on regenerate (fresh slate)
            const promptEl = document.getElementById('prompt-area');
            if (promptEl) {
                promptEl.value = '';
                autoGrow(promptEl);
            }
            const notesEl = document.getElementById('notes-quotes');
            if (notesEl) {
                notesEl.value = '';
                autoGrow(notesEl);
            }
            document.getElementById('results').classList.remove('hidden');
        }

        function displayEmojis() {
            const grid = document.getElementById('emoji-grid');
            grid.innerHTML = '';
            selectedEmojis.forEach((key, idx) => {
                grid.appendChild(buildEmojiRow(key, 'main', idx));
            });

            // Render Simon's channel pool
            const simonGrid = document.getElementById('simon-grid');
            simonGrid.innerHTML = '';
            simonEmojis.forEach((key, idx) => {
                simonGrid.appendChild(buildEmojiRow(key, 'simon', idx));
            });
        }

        function buildEmojiRow(key, pool, idx) {
            const row = document.createElement('div');
            row.className = 'emoji-row';

            // Left side: emoji + name
            const label = document.createElement('div');
            label.className = 'emoji-row-label';
            if (isGenmoji(key)) {
                label.innerHTML = `<img src="${GENMOJI_DATABASE[key].image}" alt="${GENMOJI_DATABASE[key].name}" class="genmoji-img"><span class="emoji-name">${GENMOJI_DATABASE[key].name}</span>`;
            } else {
                label.innerHTML = `<span class="emoji-char">${key}</span><span class="emoji-name">${EMOJI_DATABASE[key]}</span>`;
            }
            row.appendChild(label);

            // Right side: note input
            const noteInput = document.createElement('textarea');
            noteInput.className = 'emoji-note-input';
            noteInput.rows = 1;
            noteInput.id = `note-${pool}-${idx}`;
            noteInput.addEventListener('input', () => autoGrow(noteInput));
            row.appendChild(noteInput);

            return row;
        }

        function autoGrow(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function getListText() {
            return selectedEmojis.map((key, idx) => {
                const noteEl = document.getElementById(`note-main-${idx}`);
                const note = noteEl && noteEl.value.trim() ? ' — ' + noteEl.value.trim() : '';
                if (isGenmoji(key)) {
                    return `[${GENMOJI_DATABASE[key].name}]${note}`;
                }
                return `${key} ${EMOJI_DATABASE[key]}${note}`;
            }).join('\n');
        }

        function getSimonListText() {
            return simonEmojis.map((key, idx) => {
                const noteEl = document.getElementById(`note-simon-${idx}`);
                const note = noteEl && noteEl.value.trim() ? ' — ' + noteEl.value.trim() : '';
                if (isGenmoji(key)) {
                    return `[${GENMOJI_DATABASE[key].name}]${note}`;
                }
                return `${key} ${EMOJI_DATABASE[key]}${note}`;
            }).join('\n');
        }

        function getNotesText() {
            const el = document.getElementById('notes-quotes');
            return el ? el.value.trim() : '';
        }

        function getPromptText() {
            const el = document.getElementById('prompt-area');
            return el ? el.value.trim() : '';
        }

        function copyText(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
            }
            return fallbackCopy(text);
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            return Promise.resolve();
        }

        function flashCopied(btn) {
            const orig = btn.textContent;
            btn.textContent = '✓ Copied!';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
        }

        function copyList(btn) {
            copyText(getListText()).then(() => flashCopied(btn));
        }

        function copySimonList(btn) {
            copyText(getSimonListText()).then(() => flashCopied(btn));
        }

        function copyNotes(btn) {
            const notes = getNotesText();
            copyText(notes || '(empty)').then(() => flashCopied(btn));
        }

        function copyAll(btn) {
            const prompt = getPromptText();
            let out = '';
            if (prompt) {
                out += '--- Prompt ---\n' + prompt + '\n\n';
            }
            out += '--- Emojis ---\n' + getListText() + '\n\n';
            out += "--- Simon's Channel ---\n" + getSimonListText() + '\n\n';
            const notes = getNotesText();
            out += '--- Notes & Quotes ---\n' + (notes || '(empty)') + '\n';
            copyText(out.trim()).then(() => flashCopied(btn));
        }

        // PWA: Register service worker for offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((reg) => console.log('Service worker registered:', reg.scope))
                    .catch((err) => console.log('Service worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
